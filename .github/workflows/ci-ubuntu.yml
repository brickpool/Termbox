name: CI on Ubuntu

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    name: Ubuntu / Perl 5.38
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.38"
          multi-thread: true

      - name: Verify Perl Runtime
        run: |
          perl -V:version
          perl -V:useithreads

      - name: Install dependencies
        run: |
          cpanm --notest --installdeps .

      - name: Run tests (headless, CPAN-style)
        env:
          AUTOMATED_TESTING: 1
          NONINTERACTIVE_TESTING: 1
        run: |
          perl Makefile.PL
          make test
